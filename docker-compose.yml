services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rezzum}
      POSTGRES_USER: ${POSTGRES_USER:-rezzumpostgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Anarchoghost2010anarcrow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rezzum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rezzum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rezzum_postgres_data:
    name: rezzum_postgres_data
    driver: local
